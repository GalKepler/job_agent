# config/sources.yaml
# Company slugs to poll. All slugs verified against live API (2026-07-18).
# Add companies here; the source runner polls all of them.
#
# Note: Apple / Google / Microsoft / Meta use proprietary career portals —
# they don't expose Greenhouse / Lever / Ashby boards. Add them via a
# "careers" scraper or SerpAPI in a later stage.

greenhouse:
  - deepmind       # 10 postings — research-heavy, strong fit
  - databricks     # 789 postings — ML infra / data
  - elastic        # 177 postings — search/data infra
  - twilio         # 165 postings

ashby:
  - openai         # 723 postings
  - cohere         # 138 postings — NLP/LLM, strong fit

lever: []

# Keyword-search sources — cover any company, no slug needed.

remotive:
  # Free, no key. All results are remote by definition.
  search_terms:
    - "machine learning"
    - "data scientist"
    - "research scientist"
    - "AI engineer"

adzuna:
  # Official API — register free at developer.adzuna.com.
  # Set ADZUNA_APP_ID and ADZUNA_APP_KEY env vars; skipped if missing.
  # Adzuna does NOT have an Israel endpoint. Supported codes include:
  # gb, us, au, de, fr, ca, in, nz, sg, za. Using gb+us for broad remote coverage.
  countries: [gb, us]
  search_terms:
    - "machine learning"
    - "data scientist"
    - "research scientist"
    - "AI"
  results_per_page: 50
  max_pages: 3

hiremetech:
  # Israeli tech job board — scraping approved by user (2026-07-19).
  # Open API endpoint, no key required.
  search_terms:
    - "machine learning"
    - "data scientist"
    - "research scientist"
    - "AI engineer"
  max_pages: 5
  page_size: 50

arbeitnow:
  # Free, no key. EU + remote focus. Tag vocabulary is generic (not ML-specific);
  # using broad IT/engineering tags and relying on the ranker to filter quality.
  tags:
    - software development
    - it
    - engineering
  max_pages: 5

